<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aeons: The Grand Unfolding</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>✦</text></svg>">
  <link rel="stylesheet" href="style.css?v=553db90">
  <meta name="game-version" content="553db90">
</head>
<body>
  <div id="game-container">
    <div id="canvas-wrapper">
      <canvas id="main-canvas"></canvas>
      <canvas id="glow-canvas"></canvas>
    </div>

    <div id="ui-layer">
      <!-- Mobile drawer header (visible only on ≤768px) -->
      <div id="mobile-drawer-header">
        <span id="mobile-drawer-title">Resources</span>
        <div class="mobile-drawer-actions">
          <button id="mobile-settings-btn" class="mobile-icon-btn" aria-label="Settings">⚙️</button>
          <button id="mobile-drawer-close" class="mobile-icon-btn" aria-label="Collapse panel">▼</button>
        </div>
      </div>

      <!-- Stats Panel -->
      <div id="stats-panel" class="panel collapsible-panel">
        <div id="stats-panel-header" class="panel-header-collapsible">
          <h2 class="panel-title">📊 Stats</h2>
          <span class="collapse-icon">▲</span>
        </div>
        <div id="stats-body" class="panel-body-collapsible"></div>
      </div>

      <div id="resource-panel" class="panel collapsible-panel">
        <div id="resource-panel-header" class="panel-header-collapsible">
          <h2 class="panel-title">Resources</h2>
          <span class="collapse-icon">▲</span>
        </div>
        <div id="resource-body" class="panel-body-collapsible">
          <div id="goal-display" class="goal-widget hidden">
            <div class="goal-header">⟡ Next Goal</div>
            <div class="goal-title"></div>
            <div class="goal-progress-row">
              <span class="goal-label"></span>
              <div class="goal-bar-track"><div class="goal-bar-fill"></div></div>
            </div>
          </div>
          <div id="resource-list"></div>
          <div id="conversion-slider-row" class="hidden">
            <div class="conversion-label-row">
              <span class="conversion-label">Conversion Rate</span>
              <span id="conversion-pct" class="conversion-pct">100% rate</span>
            </div>
            <input type="range" id="conversion-slider" min="0" max="100" value="100" class="conversion-slider">
          </div>
        </div>
      </div>

      <div id="upgrade-panel" class="panel collapsible-panel">
        <div id="upgrade-panel-header" class="panel-header-collapsible">
          <h2 class="panel-title">Upgrades</h2>
          <span class="collapse-icon">▲</span>
        </div>
        <div id="upgrade-body" class="panel-body-collapsible">
          <div id="upgrade-list"></div>
        </div>
      </div>

      <div id="chronicle-panel" class="panel hidden">
        <h2 class="panel-title">Chronicle</h2>
        <div id="chronicle-list"></div>
      </div>

      <div id="residual-bonus-panel" class="panel collapsible-panel">
        <div id="residual-bonus-panel-header" class="panel-header-collapsible">
          <h2 class="panel-title">Cosmic Legacy</h2>
          <span class="collapse-icon">▲</span>
        </div>
        <div id="residual-bonus-body" class="panel-body-collapsible">
          <div id="bonus-list"></div>
        </div>
      </div>
    </div>

    <!-- Mobile tab bar (visible only on ≤768px) -->
    <nav id="mobile-tab-bar" aria-label="Game sections">
      <button class="mobile-tab" data-panel="stats-panel" aria-label="Stats">
        <span class="mobile-tab-icon">📊</span>
        <span class="mobile-tab-label">Stats</span>
      </button>
      <button class="mobile-tab" data-panel="resource-panel" aria-label="Resources">
        <span class="mobile-tab-icon">⚡</span>
        <span class="mobile-tab-label">Resources</span>
      </button>
      <button class="mobile-tab" data-panel="upgrade-panel" aria-label="Upgrades">
        <span class="mobile-tab-icon">🔬</span>
        <span class="mobile-tab-label">Upgrades</span>
      </button>
      <button class="mobile-tab" data-panel="chronicle-panel" aria-label="Chronicle">
        <span class="mobile-tab-icon">📜</span>
        <span class="mobile-tab-label">Chronicle</span>
      </button>
      <button class="mobile-tab" data-panel="residual-bonus-panel" aria-label="Legacy">
        <span class="mobile-tab-icon">✨</span>
        <span class="mobile-tab-label">Legacy</span>
      </button>
    </nav>

    <div id="toolbar">
      <button id="chronicle-toggle" class="toolbar-btn" title="Chronicle">📜</button>
      <button id="settings-toggle" class="toolbar-btn" title="Settings">⚙️</button>
    </div>

    <div id="settings-modal" class="modal hidden">
      <div class="modal-content">
        <h2>Settings</h2>
        <div id="settings-body"></div>
        <button id="settings-close" class="modal-close">✕</button>
      </div>
    </div>

    <div id="milestone-notification-area"></div>
    <div id="offline-progress-modal" class="modal hidden"></div>
    <div id="epoch-transition-overlay" class="overlay hidden"></div>
    <div id="update-banner" class="banner hidden"></div>
    <div id="tab-conflict-banner" class="banner hidden"></div>
    <div id="save-error-banner" class="banner hidden"></div>
  </div>

  <script type="module" src="js/main.js?v=553db90"></script>
</body>
</html>
